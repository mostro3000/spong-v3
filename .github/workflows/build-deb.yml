name: Build .deb packages

on:
  push:
    branches: [main]
    tags:     ['v*']
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install build dependencies
        run: sudo apt-get install -y rsync dpkg-dev

      - name: Build .deb packages
        run: cd packaging && bash build-deb.sh

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: spong-deb-${{ github.sha }}
          path: packaging/dist/*.deb
          retention-days: 30

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: packaging/dist/*.deb
          generate_release_notes: true
          body: |
            ## Paquetes .deb

            | Paquete | Descripción |
            |---------|-------------|
            | `spong-server_*.deb` | Servidor completo: server + network agent + client + web UI |
            | `spong-client_*.deb` | Solo agente cliente (instalación interactiva) |

            ### Instalación rápida
            ```bash
            # Servidor
            dpkg -i spong-server_*.deb

            # Cliente remoto
            dpkg -i spong-client_*.deb
            ```
