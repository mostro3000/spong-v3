<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}SPONG — Configuración{% endblock %}</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:       #0d1b2a;
      --surface:  #132232;
      --surface2: #192d3e;
      --border:   #2a4258;
      --text:     #cdd8e3;
      --text-h:   #e0eaf4;
      --text-m:   #8bafc7;
      --link:     #7aabdb;
      --link-h:   #a8ccee;
      --accent:   #1e5f8a;
      --accent-h: #2575a8;
      --red:      #cc3333;
      --green:    #2d8a3e;
      --yellow:   #b8a020;
      --inp-bg:   #0d1b2a;
      --inp-brd:  #2a4258;
    }

    body { background: var(--bg); color: var(--text); font-family: system-ui, sans-serif;
           font-size: 14px; line-height: 1.5; min-height: 100vh; }

    /* Nav */
    nav { background: var(--surface); border-bottom: 1px solid var(--border);
          padding: 0 20px; display: flex; align-items: center; gap: 4px; height: 48px; }
    nav .brand { font-weight: 700; font-size: 16px; color: var(--text-h);
                 text-decoration: none; margin-right: 20px; }
    nav a { color: var(--text-m); text-decoration: none; padding: 6px 12px;
            border-radius: 4px; font-size: 13px; transition: background .15s; }
    nav a:hover, nav a.active { background: var(--surface2); color: var(--text-h); }
    nav .spacer { flex: 1; }
    nav .badge { background: var(--accent); color: #fff; font-size: 11px;
                 padding: 2px 7px; border-radius: 10px; }

    /* Main layout */
    main { max-width: 1100px; margin: 0 auto; padding: 24px 20px; }

    h1 { font-size: 20px; color: var(--text-h); margin-bottom: 20px; font-weight: 600; }
    h2 { font-size: 16px; color: var(--text-h); margin-bottom: 12px; font-weight: 600; }

    /* Cards */
    .card { background: var(--surface); border: 1px solid var(--border);
            border-radius: 8px; padding: 20px; margin-bottom: 20px; }

    /* Alerts */
    .alert { padding: 10px 14px; border-radius: 6px; margin-bottom: 16px; font-size: 13px; }
    .alert-error { background: #2a1515; border: 1px solid #7a2020; color: #f08080; }

    /* Table */
    table { width: 100%; border-collapse: collapse; font-size: 13px; }
    th { text-align: left; padding: 8px 10px; color: var(--text-m);
         border-bottom: 1px solid var(--border); font-weight: 600; font-size: 12px;
         text-transform: uppercase; letter-spacing: .04em; }
    td { padding: 9px 10px; border-bottom: 1px solid var(--border); vertical-align: middle; }
    tr:last-child td { border-bottom: none; }
    tr:hover td { background: #192d3e; }
    .mono { font-family: monospace; font-size: 12px; color: var(--text-m); }

    /* Buttons */
    .btn { display: inline-flex; align-items: center; gap: 5px; padding: 6px 14px;
           border-radius: 5px; font-size: 13px; font-weight: 500; cursor: pointer;
           border: none; text-decoration: none; transition: background .15s; }
    .btn-primary   { background: var(--accent); color: #fff; }
    .btn-primary:hover { background: var(--accent-h); }
    .btn-secondary { background: var(--surface2); color: var(--text); border: 1px solid var(--border); }
    .btn-secondary:hover { background: #223244; color: var(--text-h); }
    .btn-danger    { background: #4a1515; color: #f08080; border: 1px solid #6a2020; }
    .btn-danger:hover { background: #5a1a1a; }
    .btn-sm { padding: 4px 10px; font-size: 12px; }

    /* Forms */
    .form-group { margin-bottom: 18px; }
    .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
    label.field-label { display: block; font-size: 12px; font-weight: 600; color: var(--text-m);
                        text-transform: uppercase; letter-spacing: .04em; margin-bottom: 5px; }
    .field-hint { font-size: 11px; color: var(--text-m); margin-top: 4px; }
    input[type=text], input[type=time], textarea, select {
      background: var(--inp-bg); border: 1px solid var(--inp-brd); color: var(--text);
      border-radius: 5px; padding: 7px 10px; font-size: 13px; width: 100%;
      font-family: inherit; transition: border-color .15s; }
    input[type=text]:focus, input[type=time]:focus, textarea:focus, select:focus {
      outline: none; border-color: var(--accent); }
    textarea { resize: vertical; min-height: 70px; }

    /* Checkbox group */
    .check-group { display: flex; flex-wrap: wrap; gap: 8px; }
    .check-item { display: flex; align-items: center; gap: 5px; background: var(--surface2);
                  border: 1px solid var(--border); border-radius: 5px; padding: 5px 10px;
                  cursor: pointer; font-size: 13px; transition: border-color .15s; }
    .check-item:hover { border-color: var(--accent); }
    .check-item input { cursor: pointer; accent-color: var(--accent); }
    .check-item.checked { border-color: var(--accent); background: #152838; }

    /* Service category */
    .svc-cat { margin-bottom: 14px; }
    .svc-cat-title { font-size: 11px; font-weight: 700; color: var(--text-m);
                     text-transform: uppercase; letter-spacing: .05em; margin-bottom: 7px; }

    /* Schedules table */
    .sched-table { width: 100%; border-collapse: collapse; font-size: 13px; }
    .sched-table th { padding: 6px 8px; font-size: 11px; color: var(--text-m);
                      border-bottom: 1px solid var(--border); text-transform: uppercase; }
    .sched-table td { padding: 6px 8px; border-bottom: 1px solid var(--border); }
    .sched-table tr:last-child td { border-bottom: none; }
    .day-grid { display: flex; gap: 4px; flex-wrap: wrap; }
    .day-cb   { display: flex; align-items: center; gap: 2px; background: var(--surface2);
                border: 1px solid var(--border); border-radius: 4px; padding: 3px 6px;
                font-size: 11px; cursor: pointer; }
    .day-cb input { accent-color: var(--accent); }
    .day-cb.on { border-color: var(--accent); background: #152838; }
    .sched-table input[type=text] { width: 90px; padding: 4px 7px; }
    .sched-table input[type=time] { width: 90px; padding: 4px 7px; }

    /* Member list (groups) */
    .member-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 6px; max-height: 400px; overflow-y: auto; padding: 4px; }
    .member-item { display: flex; align-items: center; gap: 6px; background: var(--surface2);
                   border: 1px solid var(--border); border-radius: 5px; padding: 6px 10px;
                   font-size: 13px; cursor: pointer; }
    .member-item:hover { border-color: var(--accent); }
    .member-item input { accent-color: var(--accent); }
    .member-item.checked { border-color: var(--accent); background: #152838; }
    .search-input { margin-bottom: 10px; }

    /* Ping stop option */
    .ping-stop { display: flex; align-items: center; gap: 8px; background: var(--surface2);
                 border: 1px solid var(--border); border-radius: 5px; padding: 8px 12px;
                 font-size: 13px; margin-top: 8px; }
    .ping-stop input { accent-color: var(--accent); }

    /* Top bar for list pages */
    .list-header { display: flex; align-items: center; justify-content: space-between;
                   margin-bottom: 16px; }
    .tag { display: inline-block; background: var(--surface2); border: 1px solid var(--border);
           border-radius: 4px; padding: 2px 7px; font-size: 11px; color: var(--text-m);
           font-family: monospace; }

    .actions { display: flex; gap: 6px; }
    .divider { border: none; border-top: 1px solid var(--border); margin: 20px 0; }

    @media (max-width: 640px) {
      .form-row { grid-template-columns: 1fr; }
      .member-grid { grid-template-columns: 1fr 1fr; }
    }
  </style>
</head>
<body>
<nav>
  <a class="brand" href="{{ url_for('config_admin.index') }}">⚙ SPONG Config</a>
  <a href="{{ url_for('config_admin.hosts') }}"
     {% if request.endpoint and 'host' in request.endpoint %}class="active"{% endif %}>Hosts</a>
  <a href="{{ url_for('config_admin.groups') }}"
     {% if request.endpoint and 'group' in request.endpoint %}class="active"{% endif %}>Grupos</a>
  <a href="{{ url_for('config_admin.history') }}"
     {% if request.endpoint and 'history' in request.endpoint %}class="active"{% endif %}>Historial</a>
  <div class="spacer"></div>
  <a href="/" style="font-size:12px; color: var(--text-m);">← Volver al monitor</a>
</nav>
<main>
  {% block content %}{% endblock %}
</main>
<script>
// Toggle checked class on check-item / member-item / day-cb on checkbox change
document.addEventListener('change', function(e) {
  const cb = e.target;
  if (cb.type !== 'checkbox') return;
  const item = cb.closest('.check-item, .member-item, .day-cb');
  if (item) item.classList.toggle('checked', cb.checked);
});
// Init checked class on load
document.addEventListener('DOMContentLoaded', function() {
  document.querySelectorAll('.check-item input[type=checkbox], .member-item input[type=checkbox], .day-cb input[type=checkbox]').forEach(function(cb) {
    const item = cb.closest('.check-item, .member-item, .day-cb');
    if (item) item.classList.toggle('checked', cb.checked);
  });
});
</script>
</body>
</html>
